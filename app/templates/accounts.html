{% extends "base.html" %}
{% block content %}
<p id="accounts-greeting" class="eyebrow">Welcome back</p>
<h1>Accounts</h1>
<p class="muted">Select an account to view recent transactions.</p>
<section id="accounts-container" class="account-strip">
  <p class="muted empty-state">Loading accounts...</p>
</section>
<section id="transactions-panel" class="card statement-like" style="display:none;">
  <div class="section-header">
    <div>
      <h2>Transactions</h2>
      <p id="selected-account-label" class="muted">Select an account to load transactions.</p>
    </div>
    <div id="account-search-container"></div>
  </div>
  <div id="transaction-list" class="transaction-list"></div>
</section>
<script src="{{ url_for('static', filename='js/accounts.js') }}"></script>
{% endblock %}
