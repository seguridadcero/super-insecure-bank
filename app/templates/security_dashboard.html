{% extends "base.html" %}
{% block content %}
<h1>Security Dashboard</h1>
<div class="section-header action-row"><div><p class="muted">Authentication events generated by the lab application.</p></div><div><button id="clear-logs" class="btn secondary" type="button">Clean</button></div></div>
<div class="card"><pre id="logs-output">Loading logs...</pre></div>
<script>
async function loadLogs(){
  const response = await fetch('/api/security-logs');
  const data = await response.json();
  document.getElementById('logs-output').textContent = (data.logs || []).join('\n') || 'No logs available.';
}
document.getElementById('clear-logs').addEventListener('click', async () => {
  await fetch('/api/security-logs/clear', {method:'POST'});
  await loadLogs();
});
document.addEventListener('DOMContentLoaded', loadLogs);
</script>
{% endblock %}
