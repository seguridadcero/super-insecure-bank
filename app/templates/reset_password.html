{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <h1>Reset password</h1>
  <div id="reset-message" class="success" style="display:none"></div>
  <div id="reset-error" class="alert" style="display:none"></div>
  <form id="reset-password-form" style="display:none">
    <input type="hidden" name="token" value="">
    <input type="hidden" name="username" value="">

    <label>Username</label>
    <div class="readonly-field">
      <span id="reset-username" class="readonly-value">Loading...</span>
    </div>

    <label>New password</label>
    <input name="new_password" type="password" required>
    <button class="btn primary" type="submit">Change password</button>
  </form>
  <p id="back-login" style="display:none"><a class="btn" href="/login">Back to login</a></p>
</div>
<script>
async function loadResetContext(){
  const token = new URLSearchParams(window.location.search).get('token') || '';
  const response = await fetch('/api/reset-password/context?token=' + encodeURIComponent(token));
  const data = await response.json();
  if(!response.ok || !data.valid){
    const box = document.getElementById('reset-error');
    box.textContent = data.error || 'Invalid reset token.';
    box.style.display = 'block';
    return;
  }
  document.querySelector('[name="token"]').value = token;
  document.querySelector('[name="username"]').value = data.username;
  document.getElementById('reset-username').textContent = data.username;
  document.getElementById('reset-password-form').style.display = 'block';
}
document.getElementById('reset-password-form').addEventListener('submit', async function(event){
  event.preventDefault();
  const payload = {
    token: this.querySelector('[name="token"]').value,
    username: this.querySelector('[name="username"]').value,
    new_password: this.querySelector('[name="new_password"]').value
  };
  const response = await fetch('/api/reset-password/confirm', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
  const data = await response.json();
  if(!response.ok){
    const box = document.getElementById('reset-error');
    box.textContent = data.error || 'Password reset failed.';
    box.style.display = 'block';
    return;
  }
  document.getElementById('reset-password-form').style.display = 'none';
  const box = document.getElementById('reset-message');
  box.textContent = data.message || 'Password changed successfully';
  box.style.display = 'block';
  document.getElementById('back-login').style.display = 'block';
});
document.addEventListener('DOMContentLoaded', loadResetContext);
</script>
{% endblock %}
