worker_processes auto;

events {
    worker_connections 1024;
}

http {
    access_log off;
    error_log /dev/stderr warn;

    upstream sib_flask {
        server 127.0.0.1:5000;
    }

    server {
        listen 5080;
        server_name _;

        location / {
            proxy_pass http://sib_flask;
            proxy_http_version 1.1;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;

            # Intentional component disclosure for the lab
            add_header X-Backend-Server "Werkzeug/2.2.2 Python/3.10" always;
        }
    }

    server {
        listen 5443 ssl;
        server_name _;

        ssl_certificate     /app/data/certs/sib-selfsigned.crt;
        ssl_certificate_key /app/data/certs/sib-selfsigned.key;

        # Intentionally weak/legacy TLS posture for training.
        # TLS 1.1 is intentionally enabled.
        ssl_protocols TLSv1.1 TLSv1.2;

        # Includes a deliberately weak 3DES suite when available and legacy CBC/SHA suites.
        ssl_ciphers "DES-CBC3-SHA:AES128-SHA:AES256-SHA:ECDHE-RSA-AES128-SHA:ECDHE-RSA-AES256-SHA";
        ssl_prefer_server_ciphers on;

        # Lower OpenSSL policy so TLS 1.1 / legacy ciphers can be negotiated.
        ssl_conf_command MinProtocol TLSv1.1;
        ssl_conf_command CipherString "ALL:@SECLEVEL=0";

        ssl_session_cache off;
        ssl_session_tickets off;

        location / {
            proxy_pass http://sib_flask;
            proxy_http_version 1.1;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Intentional component disclosure for the lab
            add_header X-Backend-Server "Werkzeug/2.2.2 Python/3.10" always;
        }
    }
}
