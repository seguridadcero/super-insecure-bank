{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <h1>Password recovery</h1>
  <p>Enter your username to generate a mock reset email.</p>
  <div id="forgot-message" class="success" style="display:none"></div>
  <div id="forgot-error" class="alert" style="display:none"></div>
  <form id="forgot-form">
    <label>Username</label><input name="username" placeholder="fernando.conislla" required>
    <button class="btn primary" type="submit">Generate reset link</button>
  </form>
</div>
<script>
document.getElementById('forgot-form').addEventListener('submit', async function(event){
  event.preventDefault();
  document.getElementById('forgot-message').style.display = 'none';
  document.getElementById('forgot-error').style.display = 'none';
  const response = await fetch('/api/forgot-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username: this.querySelector('[name="username"]').value})
  });
  const data = await response.json();
  const box = response.ok ? document.getElementById('forgot-message') : document.getElementById('forgot-error');
  box.textContent = data.message || data.error || 'Request processed.';
  box.style.display = 'block';
});
</script>
{% endblock %}
